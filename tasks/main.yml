---
- name: Validate vykar_config has required keys
  ansible.builtin.assert:
    that:
      - vykar_config.repositories is defined
      - vykar_config.schedule is defined
    fail_msg: "vykar_config must contain 'repositories' and 'schedule' keys"

- name: Get vykar version
  when: vykar_version == "latest"
  block:
    - name: Get latest vykar version from GitHub
      ansible.builtin.uri:
        url: https://api.github.com/repos/borgbase/vykar/releases/latest
        return_content: true
      register: vykar_latest_release
      delegate_to: localhost
      become: false
      check_mode: false
    - name: Set vykar install version
      ansible.builtin.set_fact:
        vykar_install_version: "{{ vykar_latest_release.json.tag_name | regex_replace('^v', '') }}"

- name: Set vykar install version (pinned)
  ansible.builtin.set_fact:
    vykar_install_version: "{{ vykar_version | regex_replace('^v', '') }}"
  when: vykar_version != "latest"

- name: Check installed vykar version
  ansible.builtin.command: "{{ vykar_path }} --version"
  register: vykar_version_check
  ignore_errors: true
  changed_when: false

- name: Install vykar
  ansible.builtin.include_tasks: install.yml
  when: >-
    vykar_version_check.rc != 0
    or vykar_install_version not in vykar_version_check.stdout

- name: Get home directory for vykar user
  ansible.builtin.getent:
    database: passwd
    key: "{{ vykar_user }}"

- name: Set vykar home directory
  ansible.builtin.set_fact:
    vykar_home: "{{ getent_passwd[vykar_user][4] }}"

- name: Create vykar config directory
  ansible.builtin.file:
    path: "{{ vykar_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Create vykar config file
  ansible.builtin.template:
    src: vykar.yaml.j2
    dest: "{{ vykar_config_dir }}/config.yaml"
    owner: root
    group: root
    mode: "0600"

- name: Check if vykar repository is initialized
  ansible.builtin.command: "{{ vykar_path }} info"
  register: vykar_repo_check
  ignore_errors: true
  changed_when: false

- name: Initialize vykar repository
  ansible.builtin.command: "{{ vykar_path }} init"
  changed_when: true
  when: vykar_repo_check.rc != 0

- name: Add systemd service for vykar daemon
  ansible.builtin.template:
    src: vykar-daemon.service.j2
    dest: /etc/systemd/system/vykar-daemon.service
    mode: "0644"
  notify: Systemd reload

- name: Enable and start vykar daemon
  ansible.builtin.systemd:
    name: vykar-daemon
    enabled: true
    state: started
